spring.application.name=tp8-monitoring

# --- 1. Exposition des endpoints de supervision ---
# Utilisation du '*' pour tout exposer durant le TP
management.endpoints.web.exposure.include=*

# Affiche les details (espace disque, DB) dans /actuator/health
management.endpoint.health.show-details=always

# Active explicitement l'endpoint des metriques
management.endpoint.metrics.enabled=true

# Chemin racine par defaut
management.endpoints.web.base-path=/actuator

# Affiche les informations de l'environnement
management.info.env.enabled=true

# --- 2. Informations personnalisees ---
info.app.name=Spring Monitoring App
info.app.version=1.0.0
info.app.description=TP8 - Supervision et Logging Spring Boot

# --- 3. Configuration du Logging ---
logging.level.root=INFO
logging.level.ma.ens.monitoring=DEBUG
logging.file.name=logs/application.log
logging.pattern.console=%d{HH:mm:ss} [%t] %-5level %logger{36} - %msg%n

# --- 4. Configuration Prometheus ---
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
